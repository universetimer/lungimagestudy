<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>흉부 X-ray 판독 자동 채점</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
    line-height: 1.5;
  }
  .container { max-width: 1500px; margin: 0 auto; padding: 20px; }
  header {
    background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
    padding: 18px 28px;
    border-radius: 12px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { margin: 0 0 4px 0; font-size: 22px; font-weight: 700; }
  header p { margin: 0; color: #cbd5e1; font-size: 13px; }
  .case-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(15, 23, 42, 0.6);
    padding: 8px 12px;
    border-radius: 8px;
  }
  .case-nav button {
    background: #2563eb;
    color: white;
    border: none;
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
  }
  .case-nav button:hover:not(:disabled) { background: #1d4ed8; }
  .case-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  .case-nav select {
    background: #1e293b;
    color: white;
    border: 1px solid #475569;
    border-radius: 6px;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 18px; }
  .panel {
    background: #1e293b;
    border-radius: 12px;
    padding: 18px;
    border: 1px solid #334155;
  }
  .panel h2 {
    margin: 0 0 12px 0;
    font-size: 15px;
    font-weight: 600;
    color: #93c5fd;
    border-bottom: 1px solid #334155;
    padding-bottom: 8px;
  }
  .case-meta {
    background: #0f172a;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 14px;
    font-size: 13px;
    color: #cbd5e1;
  }
  .case-meta b { color: #fbbf24; }
  .xray-img {
    width: 100%;
    max-height: 65vh;
    object-fit: contain;
    border-radius: 8px;
    background: #000;
    display: block;
    border: 1px solid #334155;
  }
  .xray-placeholder {
    background: #0f172a;
    border: 2px dashed #334155;
    border-radius: 8px;
    padding: 80px 20px;
    text-align: center;
    color: #64748b;
    font-size: 13px;
  }
  .xray-placeholder code { color: #fbbf24; background: #1e293b; padding: 2px 6px; border-radius: 3px; }
  .transcript {
    width: 100%;
    min-height: 220px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    color: #e2e8f0;
    font-family: inherit;
    resize: vertical;
  }
  .transcript:focus { outline: none; border-color: #2563eb; }
  .controls {
    display: flex;
    gap: 8px;
    margin: 12px 0;
    flex-wrap: wrap;
  }
  button.btn {
    border: none;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
  }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #2563eb; color: white; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
  .btn-success { background: #16a34a; color: white; }
  .btn-success:hover:not(:disabled) { background: #15803d; }
  .btn-ghost { background: #334155; color: #e2e8f0; }
  .btn-ghost:hover:not(:disabled) { background: #475569; }
  .score-summary {
    background: #0f172a;
    padding: 14px;
    border-radius: 8px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .score-big {
    font-size: 38px;
    font-weight: 700;
    color: #22d3ee;
    line-height: 1;
  }
  .score-meta { flex: 1; }
  .score-pct { color: #94a3b8; font-size: 12px; }
  .checklist { list-style: none; padding: 0; margin: 0; }
  .checklist li {
    padding: 7px 10px;
    margin-bottom: 5px;
    border-radius: 6px;
    background: #0f172a;
    border-left: 3px solid #475569;
    font-size: 12px;
    display: flex;
    gap: 8px;
  }
  .checklist li.pass { border-left-color: #22c55e; }
  .checklist li.fail { border-left-color: #ef4444; }
  .checklist li.partial { border-left-color: #f59e0b; }
  .icon { flex-shrink: 0; width: 18px; }
  .item-content { flex: 1; }
  .item-title { font-weight: 600; }
  .item-detail { color: #94a3b8; font-size: 11px; margin-top: 2px; }
  details { margin-top: 12px; }
  summary { cursor: pointer; color: #93c5fd; font-size: 12px; padding: 4px 0; }
  .answer-box {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    color: #cbd5e1;
    margin-top: 6px;
    white-space: pre-wrap;
    font-family: "Consolas", monospace;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .summary-card {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.1s;
  }
  .summary-card:hover { border-color: #2563eb; }
  .summary-card .num { font-size: 11px; color: #94a3b8; }
  .summary-card .pct {
    font-size: 18px;
    font-weight: 700;
    color: #cbd5e1;
    margin-top: 2px;
  }
  .summary-card.high .pct { color: #22c55e; }
  .summary-card.mid .pct { color: #f59e0b; }
  .summary-card.low .pct { color: #ef4444; }
  .summary-card.none .pct { color: #475569; }
  .total-row {
    background: #0f172a;
    padding: 14px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 12px;
    font-size: 13px;
    color: #94a3b8;
  }
  .total-row b { font-size: 22px; color: #22d3ee; }
  .hint {
    background: #0c2231;
    border-left: 3px solid #0891b2;
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 12px;
    color: #a5f3fc;
    margin: 8px 0;
    line-height: 1.5;
  }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    border-bottom: 1px solid #334155;
  }
  .tab {
    background: transparent;
    color: #94a3b8;
    border: none;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: #93c5fd; border-bottom-color: #2563eb; }
  .save-indicator {
    font-size: 11px;
    color: #64748b;
    margin-left: 6px;
  }
  @media (max-width: 1000px) {
    .grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    header { flex-direction: column; align-items: flex-start; gap: 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>흉부 X-ray 판독 자동 채점</h1>
      <p>학생이 12항목 표준 판독 템플릿에 따라 텍스트로 판독을 입력하면 자동 채점됩니다.</p>
    </div>
    <div class="case-nav">
      <button id="btnPrev" title="이전 케이스">‹</button>
      <select id="caseSelect"></select>
      <button id="btnNext" title="다음 케이스">›</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="case">케이스 판독</button>
    <button class="tab" data-view="summary">전체 결과 (10케이스)</button>
  </div>

  <!-- CASE VIEW -->
  <div id="caseView">
    <div class="grid">
      <!-- LEFT: X-ray -->
      <div class="panel">
        <h2 id="caseTitle">Loading...</h2>
        <div class="case-meta" id="caseMeta"></div>
        <div id="xrayContainer"></div>
      </div>

      <!-- RIGHT: Reading + Score -->
      <div class="panel">
        <h2>판독 입력 <span class="save-indicator" id="saveIndicator"></span></h2>
        <textarea class="transcript" id="reading"
          placeholder="12항목 순서대로 자유롭게 입력하세요. 예시:&#10;1) Chest PA&#10;2) Lung volume: symmetric&#10;3) Tracheal deviation (-)&#10;..."></textarea>
        <div class="controls">
          <button class="btn btn-success" id="btnGrade">📝 채점</button>
          <button class="btn btn-ghost" id="btnClear">↻ 입력 지우기</button>
        </div>
        <div class="hint">
          💡 영문 의학 용어와 한국어 혼용 가능. 정상 항목은 "(-)" 또는 "negative", 이상 항목은 "(+)" 또는 핵심 소견 키워드를 포함하세요.
        </div>
        <h2 style="margin-top:16px;">채점 결과</h2>
        <div id="scoreSection">
          <div style="color:#64748b;font-size:13px;padding:18px;text-align:center;">
            판독 입력 후 '채점' 버튼을 누르세요.
          </div>
        </div>
        <details id="answerDetails" style="display:none;">
          <summary>📋 모범 답안 보기 (채점 후 공개)</summary>
          <div class="answer-box" id="answerBox"></div>
        </details>
      </div>
    </div>
  </div>

  <!-- SUMMARY VIEW -->
  <div id="summaryView" style="display:none;">
    <div class="panel">
      <h2>전체 케이스 결과 요약</h2>
      <div class="total-row">
        평균 점수: <b id="avgScore">—</b> · 채점 완료 <span id="doneCount">0</span> / <span id="totalCount">10</span>
      </div>
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="controls">
        <button class="btn btn-ghost" id="btnResetAll">↻ 모든 진행 상황 초기화</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
let CASES = [];
let currentIdx = 0;
const STORAGE_KEY = "cxr-grading-state-v1";
let state = { readings: {}, scores: {} };  // {caseId: text}, {caseId: scoreObj}

// ============================================================
// Persistence
// ============================================================
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = JSON.parse(s);
    if (!state.readings) state.readings = {};
    if (!state.scores) state.scores = {};
  } catch (e) {
    state = { readings: {}, scores: {} };
  }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}

// ============================================================
// Load cases.json
// ============================================================
async function loadCases() {
  try {
    const res = await fetch("cases.json?v=" + Date.now());
    const data = await res.json();
    CASES = data.cases || [];
    if (CASES.length === 0) throw new Error("No cases");
    populateCaseSelector();
    renderCase(0);
    renderSummary();
  } catch (e) {
    document.getElementById("caseTitle").textContent = "❌ cases.json 로드 실패";
    document.getElementById("xrayContainer").innerHTML =
      `<div class="xray-placeholder">cases.json을 읽지 못했습니다.<br>${e.message}</div>`;
  }
}

function populateCaseSelector() {
  const sel = document.getElementById("caseSelect");
  sel.innerHTML = CASES.map((c, i) =>
    `<option value="${i}">${c.label}</option>`
  ).join("");
  sel.addEventListener("change", () => renderCase(+sel.value));
}

// ============================================================
// Render a case
// ============================================================
function renderCase(idx) {
  if (idx < 0 || idx >= CASES.length) return;
  currentIdx = idx;
  document.getElementById("caseSelect").value = idx;
  const c = CASES[idx];

  document.getElementById("caseTitle").textContent = c.label;
  document.getElementById("caseMeta").innerHTML = c.clinicalHint
    ? `<b>임상 정보:</b> ${escapeHtml(c.clinicalHint)}`
    : "";

  // Image — with fallback if missing
  const imgContainer = document.getElementById("xrayContainer");
  const img = new Image();
  img.className = "xray-img";
  img.alt = c.label;
  img.onerror = () => {
    imgContainer.innerHTML = `<div class="xray-placeholder">
      📷 X-ray 이미지 없음<br>
      <code>${escapeHtml(c.image)}</code> 경로에 파일을 추가하세요.<br>
      <small>저장소에는 환자 정보 보호를 위해 이미지가 포함되지 않습니다.</small>
    </div>`;
  };
  img.src = c.image;
  imgContainer.innerHTML = "";
  imgContainer.appendChild(img);

  // Saved reading
  document.getElementById("reading").value = state.readings[c.id] || "";

  // Saved score
  if (state.scores[c.id]) {
    renderScore(state.scores[c.id], c);
  } else {
    document.getElementById("scoreSection").innerHTML =
      `<div style="color:#64748b;font-size:13px;padding:18px;text-align:center;">판독 입력 후 '채점' 버튼을 누르세요.</div>`;
    document.getElementById("answerDetails").style.display = "none";
  }

  document.getElementById("btnPrev").disabled = idx === 0;
  document.getElementById("btnNext").disabled = idx === CASES.length - 1;

  document.getElementById("saveIndicator").textContent =
    state.readings[c.id] ? "(자동 저장됨)" : "";
}

// ============================================================
// Grading
// ============================================================
function gradeReading(text, caseData) {
  const lower = text.toLowerCase();
  const results = caseData.items.map(item => {
    if (item.optional) {
      // Optional item — only count if mentioned, else neutral
      const mentioned = item.keywords.some(k => lower.includes(k.toLowerCase()));
      return {
        ...item,
        status: mentioned ? "pass" : "skip",
        detail: mentioned
          ? `보너스 항목 언급함 ✓`
          : `보너스 항목 (선택). ${item.correctAnswer || ""}`
      };
    }

    const mentioned = item.keywords.some(k => lower.includes(k.toLowerCase()));

    if (!mentioned) {
      return {
        ...item,
        status: "fail",
        detail: `이 항목을 언급하지 않았습니다. 모범답안: ${item.correctAnswer || ""}`
      };
    }

    if (item.negative) {
      // Negative finding — mentioning the keyword is enough
      return { ...item, status: "pass", detail: `언급함 ✓ (정상 소견: ${item.correctAnswer || ""})` };
    }

    if (item.requireAny && item.requireAny.length > 0) {
      const hit = item.requireAny.find(k => lower.includes(k.toLowerCase()));
      if (hit) {
        return { ...item, status: "pass", detail: `핵심 소견 "${hit}" 언급 ✓` };
      }
      return {
        ...item,
        status: "partial",
        detail: `항목은 언급했지만 핵심 소견(${item.requireAny.join(" / ")}) 누락. 모범답안: ${item.correctAnswer || ""}`
      };
    }

    // Default: mentioned = ok
    return { ...item, status: "pass", detail: `언급함 ✓` };
  });

  const counted = results.filter(r => r.status !== "skip");
  const passCount = counted.filter(r => r.status === "pass").length;
  const partialCount = counted.filter(r => r.status === "partial").length;
  const total = counted.length;
  const score = passCount + partialCount * 0.5;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;

  return { results, passCount, partialCount, total, score, pct };
}

function renderScore(g, caseData) {
  const icon = (s) => s === "pass" ? "✅" : s === "partial" ? "⚠️" : s === "skip" ? "➖" : "❌";
  const html = `
    <div class="score-summary">
      <div class="score-big">${g.score} / ${g.total}</div>
      <div class="score-meta">
        <div style="font-size:14px;font-weight:600;color:#cbd5e1;">${g.pct}점</div>
        <div class="score-pct">통과 ${g.passCount} · 부분 ${g.partialCount} · 누락 ${g.total - g.passCount - g.partialCount}</div>
      </div>
    </div>
    <ul class="checklist">
      ${g.results.map(r => `
        <li class="${r.status}">
          <span class="icon">${icon(r.status)}</span>
          <div class="item-content">
            <div class="item-title">${r.n}. ${escapeHtml(r.title)}</div>
            <div class="item-detail">${escapeHtml(r.detail)}</div>
          </div>
        </li>
      `).join("")}
    </ul>
  `;
  document.getElementById("scoreSection").innerHTML = html;

  // Show answer
  const ansBox = document.getElementById("answerBox");
  ansBox.textContent = caseData.items
    .map(it => `${it.n}. ${it.title}\n   → ${it.correctAnswer || "—"}`)
    .join("\n\n");
  document.getElementById("answerDetails").style.display = "block";
}

// ============================================================
// Summary view
// ============================================================
function renderSummary() {
  const grid = document.getElementById("summaryGrid");
  const total = CASES.length;
  let done = 0, sumPct = 0;

  grid.innerHTML = CASES.map((c, i) => {
    const sc = state.scores[c.id];
    if (sc) { done++; sumPct += sc.pct; }
    const cls = !sc ? "none"
      : sc.pct >= 80 ? "high"
      : sc.pct >= 50 ? "mid"
      : "low";
    return `
      <div class="summary-card ${cls}" data-idx="${i}">
        <div class="num">Case ${i + 1}</div>
        <div class="pct">${sc ? sc.pct + "점" : "—"}</div>
      </div>
    `;
  }).join("");

  grid.querySelectorAll(".summary-card").forEach(el => {
    el.addEventListener("click", () => {
      switchView("case");
      renderCase(+el.dataset.idx);
    });
  });

  document.getElementById("totalCount").textContent = total;
  document.getElementById("doneCount").textContent = done;
  document.getElementById("avgScore").textContent =
    done > 0 ? `${Math.round(sumPct / done)}점` : "—";
}

// ============================================================
// Utility
// ============================================================
function escapeHtml(s) {
  return String(s || "").replace(/[&<>]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])
  );
}

function switchView(name) {
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.view === name)
  );
  document.getElementById("caseView").style.display = name === "case" ? "" : "none";
  document.getElementById("summaryView").style.display = name === "summary" ? "" : "none";
  if (name === "summary") renderSummary();
}

// ============================================================
// Wire up controls
// ============================================================
document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => switchView(t.dataset.view));
});

document.getElementById("btnPrev").addEventListener("click", () => {
  if (currentIdx > 0) renderCase(currentIdx - 1);
});
document.getElementById("btnNext").addEventListener("click", () => {
  if (currentIdx < CASES.length - 1) renderCase(currentIdx + 1);
});

document.getElementById("reading").addEventListener("input", (e) => {
  const c = CASES[currentIdx];
  if (!c) return;
  state.readings[c.id] = e.target.value;
  saveState();
  document.getElementById("saveIndicator").textContent = "(자동 저장됨)";
});

document.getElementById("btnGrade").addEventListener("click", () => {
  const c = CASES[currentIdx];
  if (!c) return;
  const text = document.getElementById("reading").value.trim();
  if (!text) { alert("판독 내용을 먼저 입력하세요."); return; }
  const g = gradeReading(text, c);
  state.scores[c.id] = { pct: g.pct, score: g.score, total: g.total };
  saveState();
  renderScore(g, c);
});

document.getElementById("btnClear").addEventListener("click", () => {
  const c = CASES[currentIdx];
  if (!c) return;
  if (!confirm(`Case ${currentIdx + 1}의 판독 입력을 지우시겠습니까?`)) return;
  document.getElementById("reading").value = "";
  delete state.readings[c.id];
  delete state.scores[c.id];
  saveState();
  document.getElementById("scoreSection").innerHTML =
    `<div style="color:#64748b;font-size:13px;padding:18px;text-align:center;">판독 입력 후 '채점' 버튼을 누르세요.</div>`;
  document.getElementById("answerDetails").style.display = "none";
  document.getElementById("saveIndicator").textContent = "";
});

document.getElementById("btnResetAll").addEventListener("click", () => {
  if (!confirm("정말로 모든 케이스의 판독과 점수를 초기화하시겠습니까?")) return;
  state = { readings: {}, scores: {} };
  saveState();
  renderCase(currentIdx);
  renderSummary();
});

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
  if (e.key === "ArrowLeft" && currentIdx > 0) renderCase(currentIdx - 1);
  if (e.key === "ArrowRight" && currentIdx < CASES.length - 1) renderCase(currentIdx + 1);
});

// ============================================================
// Boot
// ============================================================
loadState();
loadCases();
</script>
</body>
</html>
